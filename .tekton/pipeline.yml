apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: output

  params:
    - name: repo-url
      type: string
      description: The URL of the Git repository to clone
    - name: branch
      type: string
      description: The branch to clone
      default: main
    - name: app-name
      type: string
      description: The name of the application
    - name: build-image
      type: string
      description: The fully-qualified image name to build and deploy

  tasks:
    # 1. Cleanup workspace
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    # 2. Clone the Git repository
    - name: clone
      taskRef:
        name: git-clone
        kind: ClusterTask
      runAfter:
        - cleanup
      workspaces:
        - name: output
          workspace: output
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)

    # 3. Lint with flake8 (inline task — no ClusterTask dependency)
    - name: lint
      taskRef:
        name: flake8
      runAfter:
        - clone
      workspaces:
        - name: source
          workspace: output

    # 4. Run unit tests with nose
    - name: tests
      taskRef:
        name: nose
      runAfter:
        - lint
      workspaces:
        - name: source
          workspace: output
      params:
        - name: args
          value: "-v --with-spec --spec-color --with-coverage --cover-package=app"

    # 5. Build image with buildah
    - name: build
      taskRef:
        name: buildah
        kind: ClusterTask
      runAfter:
        - tests
      workspaces:
        - name: source
          workspace: output
      params:
        - name: IMAGE
          value: $(params.build-image)

    # 6. Deploy to OpenShift
    - name: deploy
      taskRef:
        name: openshift-client
        kind: ClusterTask
      runAfter:
        - build
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) \
              --image=$(params.build-image) \
              --dry-run=client -o yaml | oc apply -f -
